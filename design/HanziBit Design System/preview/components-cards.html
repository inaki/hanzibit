<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 18px; display:grid; grid-template-columns: 1fr 1fr; gap:14px; background: #f9f7f4; border: none; }
.inner { background:#fff; border-radius:14px; box-shadow: 0 0 0 1px rgba(0,0,0,0.06); padding: 16px; }
.eye { display:flex; align-items:center; gap:8px; font-size: 12px; font-weight: 600; color:#525252; }
.eye .dot { width:14px; height:14px; border-radius:3px; background:#e8601c; }
.value { font-size: 30px; font-weight: 700; color:#1a1a1a; margin-top: 10px; }
.sub { font-size: 12px; color: #737373; margin-top: 4px; }
.title { font-size: 16px; font-weight: 600; color:#1a1a1a; }
.desc { font-size: 14px; color:#737373; margin-top:4px; }
</style>
</head><body>
<div class="card">
  <div class="inner">
    <div class="eye"><span class="dot"></span>STREAK</div>
    <div class="value">14</div>
    <div class="sub">days in a row</div>
  </div>
  <div class="inner">
    <div class="eye"><span class="dot" style="background:#2563a8;"></span>ENTRIES</div>
    <div class="value">23</div>
    <div class="sub">journal entries written</div>
  </div>
  <div class="inner" style="grid-column: span 2;">
    <div class="title">Today's Practice</div>
    <div class="desc">2 of 3 steps completed. Finish the remaining step to complete today's practice.</div>
  </div>
</div>
</body></html>
