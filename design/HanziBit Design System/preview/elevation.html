<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:flex; gap: 22px; flex-wrap:wrap; align-items:flex-start; }
.demo { width: 180px; height: 110px; background:#fff; border-radius: 14px; display:flex; align-items:center; justify-content:center; font-size: 12px; color: #737373; }
.ring { box-shadow: 0 0 0 1px rgba(0,0,0,0.1); }
.shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
.border { border: 1px solid #e5e5e5; }
.tag { font-size: 10px; font-weight: 600; color:#a3a3a3; letter-spacing:0.1em; text-transform:uppercase; margin-top: 8px; }
.item { display:flex; flex-direction:column; }
</style>
</head><body>
<div class="card">
  <div class="item"><div class="demo ring">ring-1 /10</div><div class="tag">Default card</div></div>
  <div class="item"><div class="demo border">1px border</div><div class="tag">Panels</div></div>
  <div class="item"><div class="demo shadow-sm">shadow-sm</div><div class="tag">Character tile only</div></div>
  <div class="item"><div class="demo" style="background:#fef3ed;">flat, tinted</div><div class="tag">Tone panel</div></div>
</div>
</body></html>
