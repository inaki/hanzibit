<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.panel { border-radius: 12px; padding: 12px 14px; font-size: 13px; line-height: 1.5; }
.p-orange { background:#fef3ed; border:1px solid rgba(232,96,28,0.2); color:#c44d14; }
.p-emerald { background:#effaf3; border:1px solid rgba(19,122,77,0.18); color:#137a4d; }
.p-rose { background:#fdeeec; border:1px solid rgba(184,58,44,0.18); color:#b83a2c; }
.p-amber { background:#fbf5e4; border:1px solid rgba(138,107,18,0.18); color:#8a6b12; }
.title { font-weight:600; display:block; margin-bottom: 2px; }
</style>
</head><body>
<div class="card">
  <div class="panel p-orange"><span class="title">Focus word · 服务员</span>Finish writing with 服务员 to complete today's loop.</div>
  <div class="panel p-emerald"><span class="title">All caught up</span>No struggling cards right now.</div>
  <div class="panel p-rose"><span class="title">Overdue</span>12 flashcards missed their review window.</div>
  <div class="panel p-amber"><span class="title">In progress</span>Finish the remaining steps to complete today's practice.</div>
</div>
</body></html>
