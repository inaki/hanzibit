<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:flex; flex-wrap:wrap; gap: 22px; align-items:flex-end; }
.radii { display:flex; align-items:flex-end; gap:14px; }
.r { display:flex; flex-direction:column; align-items:center; gap:6px; }
.r .box { width:64px; height:64px; background:#fef3ed; border:1px solid #f2c0a4; }
.r .lbl { font-family:var(--app-font-mono); font-size:10px; color:#737373; }
.r .name { font-size:10px; font-weight:600; color:#a3a3a3; letter-spacing:0.1em; text-transform:uppercase; }
</style>
</head><body>
<div class="card">
  <div class="radii">
    <div class="r"><div class="box" style="border-radius:6px;"></div><div class="name">sm</div><div class="lbl">6px</div></div>
    <div class="r"><div class="box" style="border-radius:8px;"></div><div class="name">md</div><div class="lbl">8px</div></div>
    <div class="r"><div class="box" style="border-radius:10px;"></div><div class="name">lg</div><div class="lbl">10px</div></div>
    <div class="r"><div class="box" style="border-radius:14px;"></div><div class="name">xl</div><div class="lbl">14px</div></div>
    <div class="r"><div class="box" style="border-radius:18px;"></div><div class="name">2xl</div><div class="lbl">18px</div></div>
    <div class="r"><div class="box" style="border-radius:22px;"></div><div class="name">3xl</div><div class="lbl">22px</div></div>
    <div class="r"><div class="box" style="border-radius:26px;"></div><div class="name">4xl</div><div class="lbl">26px</div></div>
    <div class="r"><div class="box" style="border-radius:9999px;"></div><div class="name">full</div><div class="lbl">pill</div></div>
  </div>
</div>
</body></html>
