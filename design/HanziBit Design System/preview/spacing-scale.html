<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:flex; flex-wrap:wrap; gap: 24px; align-items:flex-end; }
.s { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
.s .bar { background:#e8601c; height:16px; border-radius:3px; }
.s .lbl { font-family:var(--app-font-mono); font-size:10px; color:#737373; }
.s .name { font-size:10px; font-weight:600; color:#a3a3a3; letter-spacing:0.1em; text-transform:uppercase; }
</style>
</head><body>
<div class="card">

  <div class="s"><div class="bar" style="width:8px"></div><div class="name">2</div><div class="lbl">8px</div></div>
  <div class="s"><div class="bar" style="width:12px"></div><div class="name">3</div><div class="lbl">12px</div></div>
  <div class="s"><div class="bar" style="width:16px"></div><div class="name">4</div><div class="lbl">16px</div></div>
  <div class="s"><div class="bar" style="width:20px"></div><div class="name">5</div><div class="lbl">20px</div></div>
  <div class="s"><div class="bar" style="width:24px"></div><div class="name">6</div><div class="lbl">24px</div></div>
  <div class="s"><div class="bar" style="width:32px"></div><div class="name">8</div><div class="lbl">32px</div></div>
  <div class="s"><div class="bar" style="width:48px"></div><div class="name">12</div><div class="lbl">48px</div></div>
  <div class="s"><div class="bar" style="width:64px"></div><div class="name">16</div><div class="lbl">64px</div></div>
</div>
</body></html>
