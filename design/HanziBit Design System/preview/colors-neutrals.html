<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding:18px; }
.grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.sw { border-radius: 8px; aspect-ratio: 1/1; border:1px solid rgba(0,0,0,0.06); display:flex; align-items:flex-end; padding: 6px; }
.sw span { font-family: var(--app-font-mono); font-size: 10px; opacity:0.85; }
.label { font-size:11px; font-weight:600; color:#525252; margin: 10px 0 6px; letter-spacing:0.02em; }
</style>
</head><body>
<div class="card">
  <div class="label">Neutrals · light (OKLCH lightness ramp)</div>
  <div class="grid">
    <div class="sw" style="background:#f9f7f4; color:#1a1a1a;"><span>975</span></div>
    <div class="sw" style="background:#f5f5f5; color:#1a1a1a;"><span>97</span></div>
    <div class="sw" style="background:#ebebeb; color:#1a1a1a;"><span>922</span></div>
    <div class="sw" style="background:#8d8d8d; color:#fff;"><span>556</span></div>
    <div class="sw" style="background:#404040; color:#fff;"><span>269</span></div>
    <div class="sw" style="background:#2b2b2b; color:#fff;"><span>205</span></div>
    <div class="sw" style="background:#1a1a1a; color:#fff;"><span>145</span></div>
  </div>
  <div class="label">Neutrals · dark mode values</div>
  <div class="grid">
    <div class="sw" style="background:#1a1a1a; color:#fff;"><span>145</span></div>
    <div class="sw" style="background:#2b2b2b; color:#fff;"><span>205</span></div>
    <div class="sw" style="background:#404040; color:#fff;"><span>269</span></div>
    <div class="sw" style="background:#b3b3b3; color:#1a1a1a;"><span>708</span></div>
    <div class="sw" style="background:#f7f7f7; color:#1a1a1a;"><span>985</span></div>
    <div class="sw" style="background:rgba(255,255,255,0.1); color:#fff; border-color:#444;"><span>/10</span></div>
    <div class="sw" style="background:rgba(255,255,255,0.15); color:#fff; border-color:#444;"><span>/15</span></div>
  </div>
</div>
</body></html>
