<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:flex; align-items:center; gap:22px; }
.tile { width:56px; height:56px; border-radius:14px; background:#e8601c; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:32px; line-height:1; }
.wordmark { font-size:28px; font-weight:700; color:#1a1a1a; letter-spacing:-0.01em; }
.sub { font-size:12px; color:#737373; margin-top:2px; }
.alt { display:flex; align-items:center; gap:10px; margin-left:auto; padding: 8px 12px; border:1px solid #e5e5e5; border-radius:12px; }
.alt .t { width:28px; height:28px; border-radius:8px; background:#e8601c; color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; }
.alt-sub { font-size:11px; color:#a3a3a3; }
</style>
</head><body>
<div class="card">
  <div class="tile">汉</div>
  <div>
    <div class="wordmark">HanziBit</div>
    <div class="sub">Your Mandarin learning companion</div>
  </div>
  <div class="alt">
    <div class="t">H</div>
    <div><div style="font-size:13px; font-weight:600;">Alt mark</div><div class="alt-sub">BookOpen or initial</div></div>
  </div>
</div>
</body></html>
