<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; padding:18px; }
.swatch { border-radius: 10px; padding: 14px; min-height: 96px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--border); }
.sw-name { font-size: 12px; font-weight: 600; }
.sw-hex { font-family: var(--app-font-mono); font-size: 11px; opacity: 0.75; }
.on-orange { color:#fff; background: #e8601c; border-color: #e8601c; }
.on-orange-light { background:#fef3ed; color:#c44d14; border-color:#f6d8c7; }
.on-orange-dark { background:#c44d14; color:#fff; border-color:#c44d14; }
</style>
</head><body>
<div class="card">
  <div class="swatch on-orange"><div class="sw-name">cn-orange</div><div class="sw-hex">#e8601c · oklch(0.6 0.18 45)</div></div>
  <div class="swatch on-orange-light"><div class="sw-name">cn-orange-light</div><div class="sw-hex">#fef3ed</div></div>
  <div class="swatch on-orange-dark"><div class="sw-name">cn-orange-dark</div><div class="sw-hex">#c44d14 · hover</div></div>
</div>
</body></html>
