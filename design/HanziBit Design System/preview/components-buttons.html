<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:flex; gap: 10px; flex-wrap:wrap; align-items:center; }
.btn {
  display:inline-flex; align-items:center; gap:6px; padding: 0 12px; height: 32px;
  border-radius: 10px; font-size: 14px; font-weight: 500; border: 1px solid transparent; cursor:pointer;
  font-family: var(--app-font-sans);
}
.primary { background:#e8601c; color:#fff; }
.primary:hover { background:#c44d14; }
.outline { background:#fff; color:#1a1a1a; border-color:#e5e5e5; }
.secondary { background:#f5f5f5; color:#1a1a1a; }
.ghost { background:transparent; color:#525252; }
.destructive { background: #fdeeec; color:#b83a2c; }
.link { background: transparent; color:#e8601c; text-decoration: underline; text-underline-offset: 3px; padding:0; height:auto; }
.lg { height: 40px; padding: 0 24px; font-size: 15px; }
.sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 8px; }
</style>
</head><body>
<div class="card">
  <button class="btn primary">Start Learning Free</button>
  <button class="btn outline">See How It Works</button>
  <button class="btn secondary">Secondary</button>
  <button class="btn ghost">Ghost</button>
  <button class="btn destructive">Delete</button>
  <button class="btn link">Open journal →</button>
  <button class="btn primary sm">sm</button>
  <button class="btn primary lg">lg</button>
</div>
</body></html>
