<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; }
.eye { display:flex; align-items:center; gap:8px; font-size: 12px; font-weight: 600; color: #525252; margin-bottom: 10px; }
.eye .ic { width:14px; height:14px; background:#e8601c; border-radius:3px; }
.track { height: 10px; background: #f5f5f5; border-radius: 999px; overflow: hidden; }
.fill { height: 100%; background: #e8601c; border-radius: 999px; }
.row { display:flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color:#737373; }
.val { color:#e8601c; font-weight:600; }
</style>
</head><body>
<div class="card">
  <div class="eye"><span class="ic"></span>HSK 1 Progress <span style="margin-left:auto;" class="val">43%</span></div>
  <div class="track"><div class="fill" style="width:43%"></div></div>
  <div class="row"><span>64 / 150 words encountered</span><span style="color:#e8601c;">Open study guide →</span></div>
</div>
</body></html>
