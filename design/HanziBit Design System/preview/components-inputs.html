<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding: 22px; display:flex; flex-direction:column; gap: 12px; }
.input { width: 100%; height: 36px; border-radius: 10px; border: 1px solid #e5e5e5; padding: 0 12px; font-size: 14px; background:#fff; color: #1a1a1a; font-family: var(--app-font-sans); outline: none; }
.input:focus { border-color: #e8601c; box-shadow: 0 0 0 3px rgba(232,96,28,0.25); }
.label { font-size: 12px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; display:block; }
.hint { font-size: 11px; color: #a3a3a3; margin-top: 4px; }
.row { display:flex; gap: 12px; }
.row > div { flex: 1; }
.err { color:#b83a2c; }
.err-box { background: #fdeeec; border: 1px solid rgba(184,58,44,0.2); border-radius: 10px; padding: 10px 12px; color: #b83a2c; font-size: 13px; }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div>
      <label class="label">Email</label>
      <input class="input" value="learner@hanzibit.local"/>
    </div>
    <div>
      <label class="label">HSK level</label>
      <input class="input" value="HSK 2"/>
    </div>
  </div>
  <div>
    <label class="label err">Password</label>
    <input class="input" style="border-color:#b83a2c;" value=""/>
    <div class="hint err">Please enter a password.</div>
  </div>
  <div class="err-box">Something went wrong. Try again in a moment.</div>
</div>
</body></html>
