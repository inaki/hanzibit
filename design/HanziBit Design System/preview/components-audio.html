<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.card { padding:22px; display:flex; gap:22px; align-items:center; flex-wrap:wrap; }
.audio { width:28px; height:28px; border-radius:999px; background:#fef3ed; color:#e8601c; display:inline-flex; align-items:center; justify-content:center; border:1px solid rgba(232,96,28,0.2); font-size:13px; }
.audio.play { background:#e8601c; color:#fff; border-color:#e8601c; }
.audio.locked { background:#f5f5f5; color:#a3a3a3; border-color:#e5e5e5; }
.audio.loading { background:#fef3ed; color:#e8601c; }
.lbl { font-size:10px; font-weight:600; color:#a3a3a3; letter-spacing:0.1em; text-transform:uppercase; }
.item { display:flex; flex-direction:column; align-items:center; gap:6px; }
</style>
</head><body>
<div class="card">
  <div class="item"><div class="audio">▶</div><div class="lbl">Idle</div></div>
  <div class="item"><div class="audio loading">◌</div><div class="lbl">Loading</div></div>
  <div class="item"><div class="audio play">❚❚</div><div class="lbl">Playing</div></div>
  <div class="item"><div class="audio locked">🔒</div><div class="lbl">Pro locked</div></div>
  <div style="flex:1; font-size:13px; color:#525252;">
    <div style="font-weight:600; color:#1a1a1a;">Audio play button</div>
    <div>Word audio is free; sentence/phrase audio requires Pro. Sits inline beside hanzi.</div>
  </div>
</div>
</body></html>
